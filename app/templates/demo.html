{% extends "base.html" %}

{% block title %}ML Bot - Demo{% endblock %}

{% block head %}
<style>
    .container { max-width: 700px; margin: 32px auto; padding: 0 24px; }
    .card { background: white; border-radius: 12px; padding: 28px; margin-bottom: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
    .card h2 { font-size: 16px; font-weight: 700; margin-bottom: 20px; color: #333; }
    label { display: block; font-size: 13px; font-weight: 600; color: #555; margin-bottom: 8px; }
    input, textarea { width: 100%; padding: 12px 16px; border: 1.5px solid #e0e0e0; border-radius: 10px; font-size: 14px; outline: none; font-family: 'Segoe UI', sans-serif; margin-bottom: 16px; }
    input:focus, textarea:focus { border-color: #3483fa; }
    textarea { resize: vertical; min-height: 80px; }
    .btn { width: 100%; padding: 14px; background: #3483fa; color: white; border: none; border-radius: 10px; font-size: 15px; font-weight: 600; cursor: pointer; }
    .btn:hover { background: #2968c8; }
    .btn:disabled { background: #aaa; cursor: not-allowed; }
    .resultado { display: none; margin-top: 24px; }
    .mensaje { border-radius: 12px; padding: 16px 20px; margin-bottom: 12px; font-size: 14px; line-height: 1.6; }
    .mensaje.comprador { background: #f0f0f0; }
    .mensaje.bot { background: #e8f0fe; border-left: 4px solid #3483fa; }
    .mensaje-label { font-size: 11px; font-weight: 700; color: #888; margin-bottom: 6px; text-transform: uppercase; }
    .typing { display: flex; gap: 4px; align-items: center; padding: 16px 20px; background: #e8f0fe; border-radius: 12px; border-left: 4px solid #3483fa; margin-bottom: 12px; }
    .typing span { width: 8px; height: 8px; background: #3483fa; border-radius: 50%; animation: bounce 1.2s infinite; }
    .typing span:nth-child(2) { animation-delay: 0.2s; }
    .typing span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce { 0%, 60%, 100% { transform: translateY(0); } 30% { transform: translateY(-6px); } }
</style>
{% endblock %}

{% block content %}
<div class="container">
    <div class="card">
        <h2>🎮 Probá el bot en vivo</h2>
        <label>Producto</label>
        <input type="text" id="producto" value="iPhone 13 128GB Negro">
        <label>Precio</label>
        <input type="text" id="precio" value="500000">
        <label>Descripción del producto</label>
        <textarea id="descripcion">Smartphone Apple iPhone 13, pantalla 6.1 pulgadas, cámara dual 12MP, batería de larga duración. Nuevo en caja con garantía oficial de 1 año.</textarea>
        <label>Pregunta del comprador</label>
        <input type="text" id="pregunta" value="¿El celular viene con cargador?">
        <button class="btn" id="btnDemo" onclick="probarBot()">⚡ Probar bot</button>

        <div class="resultado" id="resultado">
            <div class="mensaje comprador">
                <div class="mensaje-label">👤 Comprador pregunta</div>
                <div id="textoPregunta"></div>
            </div>
            <div class="typing" id="typing">
                <span></span><span></span><span></span>
            </div>
            <div class="mensaje bot" id="mensajeBot" style="display:none;">
                <div class="mensaje-label">🤖 Bot responde</div>
                <div id="textoRespuesta"></div>
            </div>
        </div>
    </div>
</div>

<script>
async function probarBot() {
    const btn = document.getElementById('btnDemo');
    const resultado = document.getElementById('resultado');
    const typing = document.getElementById('typing');
    const mensajeBot = document.getElementById('mensajeBot');
    const textoPregunta = document.getElementById('textoPregunta');
    const textoRespuesta = document.getElementById('textoRespuesta');
    const pregunta = document.getElementById('pregunta').value;
    const producto = document.getElementById('producto').value;
    const precio = document.getElementById('precio').value;
    const descripcion = document.getElementById('descripcion').value;

    btn.disabled = true;
    btn.textContent = 'Generando respuesta...';
    textoPregunta.textContent = pregunta;
    mensajeBot.style.display = 'none';
    typing.style.display = 'flex';
    resultado.style.display = 'block';

    try {
        const response = await fetch('/demo/responder', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ pregunta, producto, precio, descripcion })
        });
        const data = await response.json();
        typing.style.display = 'none';
        textoRespuesta.textContent = data.respuesta;
        mensajeBot.style.display = 'block';
    } catch (e) {
        typing.style.display = 'none';
        textoRespuesta.textContent = 'Error al generar respuesta.';
        mensajeBot.style.display = 'block';
    }

    btn.disabled = false;
    btn.textContent = '⚡ Probar bot';
}
</script>
{% endblock %}
