<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}ML Bot{% endblock %}</title>
    {% block head %}{% endblock %}
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: #f5f5f5; color: #333; }
        header {
            background: #fff159;
            padding: 16px 32px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        header h1 { font-size: 22px; color: #333; }
        nav { display: flex; align-items: center; gap: 20px; }
        nav a { text-decoration: none; color: #333; font-weight: 600; font-size: 14px; }
        nav a:hover { color: #3483fa; }
        .bot-status {
            display: flex;
            align-items: center;
            gap: 8px;
            background: #333;
            color: white;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 600;
        }
        .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #22c55e;
            animation: pulso 1.5s infinite;
        }
        @keyframes pulso {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }
        .btn-cerrar {
            text-decoration: none;
            color: #888;
            font-size: 13px;
            border: 1px solid #ccc;
            padding: 6px 14px;
            border-radius: 8px;
        }
        .btn-cerrar:hover { border-color: #e53e3e; color: #e53e3e; }
    </style>
</head>
<body>

<header>
    <h1>🤖 ML Bot</h1>
    <nav>
        <a href="/">Panel</a>
        <a href="/configuracion">Configuración</a>
        <a href="/demo">Demo</a>
        <a href="/historial">Historial</a>
        <a href="/estadisticas">Estadísticas</a>
        {% if usuario and usuario.ml_nickname %}
        <div class="bot-status">
            <div class="dot"></div>
            {{ usuario.ml_nickname }}
        </div>
        {% endif %}
        <a href="/auth/desconectar" class="btn-cerrar">Cerrar sesión</a>
    </nav>
</header>

{% block content %}{% endblock %}

</body>
</html>
