<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ML Bot - Iniciar sesión</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #f5f5f5;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        .card {
            background: white;
            border-radius: 16px;
            padding: 48px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.08);
        }
        .logo {
            text-align: center;
            font-size: 42px;
            margin-bottom: 8px;
        }
        h1 {
            text-align: center;
            font-size: 22px;
            margin-bottom: 4px;
            color: #333;
        }
        .subtitulo {
            text-align: center;
            color: #888;
            font-size: 14px;
            margin-bottom: 32px;
        }
        .campo {
            margin-bottom: 16px;
        }
        label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: #555;
            margin-bottom: 6px;
        }
        input {
            width: 100%;
            padding: 12px 16px;
            border: 1.5px solid #e0e0e0;
            border-radius: 10px;
            font-size: 14px;
            outline: none;
            transition: border 0.2s;
        }
        input:focus { border-color: #3483fa; }
        .btn {
            width: 100%;
            padding: 14px;
            background: #3483fa;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 8px;
            transition: background 0.2s;
        }
        .btn:hover { background: #2968c8; }
        .error {
            background: #fff0f0;
            color: #e53e3e;
            padding: 12px 16px;
            border-radius: 10px;
            font-size: 13px;
            margin-bottom: 16px;
        }
        .link {
            text-align: center;
            margin-top: 24px;
            font-size: 13px;
            color: #888;
        }
        .link a { color: #3483fa; text-decoration: none; font-weight: 600; }
    </style>
</head>
<body>
<div class="card">
    <div class="logo">🤖</div>
    <h1>ML Bot</h1>
    <p class="subtitulo">Iniciá sesión para continuar</p>

    {% if error %}
    <div class="error">{{ error }}</div>
    {% endif %}

    <form method="POST" action="/auth/login">
        <div class="campo">
            <label>Email</label>
            <input type="email" name="email" placeholder="tu@email.com" required>
        </div>
        <div class="campo">
            <label>Contraseña</label>
            <input type="password" name="password" placeholder="••••••••" required>
        </div>
        <button class="btn" type="submit">Iniciar sesión</button>
    </form>

    <div class="link">
        ¿No tenés cuenta? <a href="/registro">Registrate</a>
    </div>
</div>
</body>
</html>
